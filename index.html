let currentIdx = 0;
function showSlide(i) {
  i = Math.max(0, Math.min(SLIDES.length - 1, i));
  currentIdx = i;
  const slides = document.querySelectorAll('.slide');
  slides.forEach((el, idx) => el.classList.toggle('active', idx === i));
  document.querySelectorAll('.dot').forEach((el, idx) => el.classList.toggle('active', idx === i));
  document.getElementById('slideCurrent').textContent = i + 1;
  document.getElementById('progressBar').style.width = ((i+1) / SLIDES.length * 100) + '%';
  // Update top-nav active state
  const navKey = activeNavKey(i);
  document.querySelectorAll('#chromeNav .chrome-nav__link').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === navKey);
  });
  // ensure clicked-into dot is visible
  const dot = document.querySelectorAll('.dot')[i];
  if (dot) dot.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // Cancel any running flows on non-active slides
  document.querySelectorAll('.slide:not(.active) .chat-flow').forEach(f => cancelChatFlow(f));
  // Auto-play chat flow on the now-active slide
  const activeSlide = slides[i];
  if (activeSlide) {
    const flow = activeSlide.querySelector('.chat-flow[data-autoplay="true"]');
    if (flow) {
      // small delay so the slide opacity transition can finish
      setTimeout(() => {
        if (activeSlide.classList.contains('active')) playChatFlow(flow);
      }, 380);
    }
  }
}

function next() { showSlide(currentIdx + 1); }
function prev() { showSlide(currentIdx - 1); }
function goto(i) { showSlide(i); }
function gotoLesson(lessonId, tab) {
  const idx = SLIDES.findIndex(s => s.lessonId === lessonId && s.tab === tab);
  if (idx >= 0) showSlide(idx);
}
function jumpToLessonTab(lessonId, tab) { gotoLesson(lessonId, tab); }
function gotoUseCase(id) {
  const idx = SLIDES.findIndex(s => s.useCaseId === id);
  if (idx >= 0) showSlide(idx);
}

function gotoNamed(key) {
  // First try exact navKey match
  let idx = SLIDES.findIndex(s => s.navKey === key);
  // Fallback: lessons → first lesson story slide
  if (idx < 0 && key === 'lessons') {
    idx = SLIDES.findIndex(s => s.lessonId === 1 && s.tab === 'story');
  }
  if (idx >= 0) showSlide(idx);
}

// Determine which nav section the current slide belongs to
function activeNavKey(idx) {
  // Walk backward from current slide to find the nearest navKey
  for (let i = idx; i >= 0; i--) {
    if (SLIDES[i].navKey) return SLIDES[i].navKey;
    // Lesson slides belong to '8 Steps'
    if (SLIDES[i].lessonId !== undefined) return 'lessons';
    // Real case slides belong to 'cases'
    if (SLIDES[i].caseCo !== undefined) return 'cases';
    if (SLIDES[i].useCaseId !== undefined) return 'usecases';
  }
  return null;
}

/* =========================================================================
   CHAT-FLOW ANIMATION ENGINE
   ========================================================================= */
const CHAT_TIMERS = new WeakMap(); // flowEl -> { timers, cancelled }
const TYPE_MS = 18;
const TYPING_INDICATOR_MS = 700;
const POST_MSG_PAUSE_MS = 320;

function cancelChatFlow(flowEl) {
  const state = CHAT_TIMERS.get(flowEl);
  if (state) {
    state.cancelled = true;
    state.timers.forEach(t => clearTimeout(t));
  }
  if (flowEl) flowEl.querySelectorAll('.typing-indicator').forEach(t => t.remove());
}

function replayChatFlow(flowEl) {
  if (!flowEl) return;
  playChatFlow(flowEl);
}

function scrollMsgIntoView(msg) {
  if (!msg) return;
  // If chat-flow has its own scroll, use that. Otherwise scroll the slide.
  const flowEl = msg.closest('.chat-flow');
  if (flowEl && flowEl.scrollHeight > flowEl.clientHeight + 4) {
    flowEl.scrollTop = flowEl.scrollHeight;
    return;
  }
  // Slide-level scroll
  msg.scrollIntoView({ block: 'end', behavior: 'auto', inline: 'nearest' });
}

function playChatFlow(flowEl) {
  if (!flowEl || !flowEl.classList.contains('chat-flow')) return;
  cancelChatFlow(flowEl);

  const messages = Array.from(flowEl.querySelectorAll('.chat-msg'));
  if (messages.length === 0) return;

  // Reset all messages
  messages.forEach(m => {
    m.classList.remove('visible');
    const bubble = m.querySelector('.chat-msg__bubble');
    if (bubble) bubble.innerHTML = '';
  });
  flowEl.querySelectorAll('.typing-indicator').forEach(t => t.remove());

  const state = { timers: [], cancelled: false };
  CHAT_TIMERS.set(flowEl, state);

  let cursorMs = 250;

  messages.forEach((msg) => {
    const side = msg.dataset.side || 'left';
    const color = msg.dataset.color || '#2563eb';
    const text = msg.dataset.text || '';
    const speaker = msg.dataset.speaker || '';
    const emoji = msg.dataset.emoji || '';

    const showIndicatorAt = cursorMs;
    const showMsgAt = showIndicatorAt + TYPING_INDICATOR_MS;
    const startTypeAt = showMsgAt + 60;

    // Typing indicator
    state.timers.push(setTimeout(() => {
      if (state.cancelled) return;
      const ind = document.createElement('div');
      ind.className = 'typing-indicator';
      ind.dataset.side = side;
      ind.innerHTML = `
        <div class="chat-msg__col">
          <div class="chat-msg__avatar" style="border-color:${color};color:${color}">${emoji}</div>
          <div class="chat-msg__speaker">${escapeHtml(speaker)}</div>
        </div>
        <div class="typing-indicator__bubble" style="border:1px solid ${hexToRgba(color,0.4)};background:${hexToRgba(color,0.06)}">
          <div class="typing-indicator__dot" style="background:${color}"></div>
          <div class="typing-indicator__dot" style="background:${color}"></div>
          <div class="typing-indicator__dot" style="background:${color}"></div>
        </div>
      `;
      flowEl.insertBefore(ind, msg);
      scrollMsgIntoView(ind);
    }, showIndicatorAt));

    // Reveal message bubble (remove indicator)
    state.timers.push(setTimeout(() => {
      if (state.cancelled) return;
      flowEl.querySelectorAll('.typing-indicator').forEach(t => t.remove());
      msg.classList.add('visible');
      scrollMsgIntoView(msg);
    }, showMsgAt));

    // Type out characters
    const bubble = msg.querySelector('.chat-msg__bubble');
    const linkedFinal = autolinkTerms(text); // final HTML after typing
    const stripped = text.replace(/\[\[([^\]]+)\]\]/g, '$1').replace(/<[^>]+>/g, '');
    const decoder = document.createElement('div');
    decoder.innerHTML = stripped;
    const plainText = decoder.textContent;

    for (let charIdx = 0; charIdx <= plainText.length; charIdx++) {
      const at = startTypeAt + charIdx * TYPE_MS;
      const isLast = charIdx === plainText.length;
      state.timers.push(setTimeout(() => {
        if (state.cancelled) return;
        if (isLast) {
          bubble.innerHTML = linkedFinal;
        } else {
          bubble.innerHTML = escapeHtml(plainText.substring(0, charIdx + 1)) + '<span class="chat-msg__cursor"></span>';
        }
        // Only scroll on last char of message (avoid jitter from per-char scrolls)
        if (isLast) scrollMsgIntoView(msg);
      }, at));
    }

    cursorMs = startTypeAt + plainText.length * TYPE_MS + POST_MSG_PAUSE_MS;
  });
}

/* Keyboard */
document.addEventListener('keydown', (e) => {
  // ignore when typing in inputs
  if (e.target.matches('input, textarea, select')) return;
  if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prev(); }
  else if (e.key === 'Home') { goto(0); }
  else if (e.key === 'End') { goto(SLIDES.length - 1); }
  else if (e.key === 'Escape') { closeTooltip(); closeGlossary(); closeAllSlides(); }
  else if (e.key === 'g' || e.key === 'G') { openGlossary(); }
  else if (e.key === 'a' || e.key === 'A') { openAllSlides(); }
});

function answerMCQ(lid, btn, idx) {
  const wrap = document.getElementById('mcq-' + lid);
  const buttons = wrap.querySelectorAll('.mcq-option');
  const isCorrect = btn.dataset.correct === 'true';
  buttons.forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === 'true') b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('incorrect');

  const fb = document.getElementById('mcq-fb-' + lid);
  const lesson = LESSONS.find(l => l.id === lid);
  const fbObj = lesson.activity.feedback;
  let text = isCorrect ? fbObj.correct : (fbObj['wrong' + idx] || 'Not quite — re-read the prompt.');
  if (!text) text = fbObj.correct;
  fb.classList.remove('feedback--correct','feedback--incorrect');
  fb.classList.add(isCorrect ? 'feedback--correct' : 'feedback--incorrect','show');
  fb.querySelector('.feedback__label').textContent = isCorrect ? 'Correct' : 'Not quite';
  fb.querySelector('.feedback__body').innerHTML = autolinkTerms(text);
}

const matchState = {};
function selectMatchLeft(lid, id) {
  matchState[lid] = matchState[lid] || { left: null, done: {} };
  if (matchState[lid].done[id]) return;
  matchState[lid].left = id;
  document.querySelectorAll(`#match-l-${lid} .match-item`).forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id && !matchState[lid].done[el.dataset.id]);
  });
}
function selectMatchRight(lid, id) {
  matchState[lid] = matchState[lid] || { left: null, done: {} };
  if (!matchState[lid].left) return;
  const lesson = LESSONS.find(l => l.id === lid);
  const correctRight = lesson.activity.pairs[matchState[lid].left];
  const leftEl  = document.querySelector(`#match-l-${lid} .match-item[data-id="${matchState[lid].left}"]`);
  const rightEl = document.querySelector(`#match-r-${lid} .match-item[data-id="${id}"]`);
  if (id === correctRight) {
    leftEl.classList.remove('selected');
    leftEl.classList.add('matched-ok');
    rightEl.classList.add('matched-ok');
    matchState[lid].done[matchState[lid].left] = id;
    matchState[lid].left = null;
    if (Object.keys(matchState[lid].done).length === lesson.activity.lefts.length) {
      const fb = document.getElementById('match-fb-' + lid);
      fb.classList.add('show','feedback--correct');
      fb.querySelector('.feedback__label').textContent = 'All matched';
      fb.querySelector('.feedback__body').innerHTML = autolinkTerms(lesson.activity.feedback);
    }
  } else {
    rightEl.classList.add('matched-bad');
    setTimeout(() => rightEl.classList.remove('matched-bad'), 600);
    leftEl.classList.remove('selected');
    matchState[lid].left = null;
  }
}

function gradeFill(lid) {
  const wrap = document.getElementById('fill-' + lid);
  const selects = wrap.querySelectorAll('select');
  let correct = 0;
  selects.forEach(s => {
    s.classList.remove('correct','incorrect');
    if (s.value === s.dataset.answer) { s.classList.add('correct'); correct++; }
    else if (s.value) s.classList.add('incorrect');
  });
  const fb = document.getElementById('fill-fb-' + lid);
  fb.classList.remove('feedback--correct','feedback--incorrect');
  fb.classList.add('show', correct === selects.length ? 'feedback--correct' : 'feedback--incorrect');
  fb.querySelector('.feedback__label').textContent = `${correct}/${selects.length} correct`;
  const lesson = LESSONS.find(l => l.id === lid);
  fb.querySelector('.feedback__body').innerHTML = autolinkTerms(lesson.activity.feedback);
}

function moveTile(lid, btn, current) {
  const side = btn.dataset.side;
  if (current === 'pool') {
    const target = document.getElementById(`sort-${side === 'up' ? 'up' : 'down'}-${lid}`);
    target.appendChild(btn);
    btn.setAttribute('onclick', `moveTile(${lid}, this, '${side}')`);
  } else {
    document.getElementById('sort-pool-' + lid).appendChild(btn);
    btn.setAttribute('onclick', `moveTile(${lid}, this, 'pool')`);
    btn.classList.remove('dragsort-tile--ok','dragsort-tile--bad');
  }
}
function gradeSort(lid) {
  const upWrap = document.getElementById('sort-up-' + lid);
  const downWrap = document.getElementById('sort-down-' + lid);
  let okCount = 0;
  [['up', upWrap], ['down', downWrap]].forEach(([bucket, wrap]) => {
    wrap.querySelectorAll('.dragsort-tile').forEach(t => {
      const correct = t.dataset.side === bucket;
      t.classList.toggle('dragsort-tile--ok', correct);
      t.classList.toggle('dragsort-tile--bad', !correct);
      if (correct) okCount++;
    });
  });
  const lesson = LESSONS.find(l => l.id === lid);
  const fb = document.getElementById('sort-fb-' + lid);
  fb.classList.remove('feedback--correct','feedback--incorrect');
  fb.classList.add('show', okCount === lesson.activity.tiles.length ? 'feedback--correct' : 'feedback--incorrect');
  fb.querySelector('.feedback__label').textContent = `${okCount}/${lesson.activity.tiles.length} placed correctly`;
  fb.querySelector('.feedback__body').innerHTML = autolinkTerms(lesson.activity.feedback);
}
function resetSort(lid) {
  const wrap = document.getElementById('sort-pool-' + lid);
  ['up','down'].forEach(side => {
    const bucket = document.getElementById(`sort-${side}-${lid}`);
    Array.from(bucket.querySelectorAll('.dragsort-tile')).forEach(tile => {
      tile.classList.remove('dragsort-tile--ok','dragsort-tile--bad');
      tile.setAttribute('onclick', `moveTile(${lid}, this, 'pool')`);
      wrap.appendChild(tile);
    });
  });
  document.getElementById('sort-fb-' + lid).classList.remove('show');
}

function pickTF(lid, idx, pick) {
  const lesson = LESSONS.find(l => l.id === lid);
  const stmt = lesson.activity.statements[idx];
  const row = document.querySelector(`#tf-${lid} .tf-row[data-idx="${idx}"]`);
  const btns = row.querySelectorAll('.tf-btn');
  const correct = stmt.answer === pick;
  btns.forEach(b => {
    b.disabled = true;
    if ((b.dataset.pick === 'true') === stmt.answer) b.classList.add('correct');
    if (b.dataset.pick === String(pick) && !correct) b.classList.add('incorrect');
  });
  const total = lesson.activity.statements.length;
  const completed = document.querySelectorAll(`#tf-${lid} .tf-btn[disabled]`).length / 2;
  if (completed === total) {
    let okCount = 0; let items = [];
    lesson.activity.statements.forEach((s, i) => {
      const r = document.querySelector(`#tf-${lid} .tf-row[data-idx="${i}"]`);
      const wasOk = !r.querySelector('.tf-btn.incorrect');
      if (wasOk) okCount++;
      const exp = wasOk ? (s.answer ? s.explainTrue : s.explainFalse) : (s.answer ? s.explainFalse : s.explainTrue);
      items.push(`<div style="margin-bottom:6px"><b>${i+1}.</b> ${autolinkTerms(exp || '')}</div>`);
    });
    const fb = document.getElementById('tf-fb-' + lid);
    fb.classList.remove('feedback--correct','feedback--incorrect');
    fb.classList.add('show', okCount === total ? 'feedback--correct' : 'feedback--incorrect');
    fb.querySelector('.feedback__label').textContent = `${okCount}/${total} correct`;
    fb.querySelector('.feedback__body').innerHTML = items.join('');
  }
}

/* =========================================================================
   CAPSTONE
   ========================================================================= */
function recalcCapstone() {
  let total = 0, completenessSum = 0, dqSum = 0, dqCount = 0, methodsAnswered = 0;
  CAPSTONE_INPUTS.forEach(inp => {
    const m = document.querySelector(`select[data-id="${inp.id}"][data-kind="method"]`);
    const dq = document.querySelector(`select[data-id="${inp.id}"][data-kind="dq"]`);
    if (m && m.value) {
      total += inp.methods[m.value];
      completenessSum += inp.completeness[m.value];
      methodsAnswered++;
    }
    if (dq && dq.value) { dqSum += parseInt(dq.value); dqCount++; }
  });
  const compPct = methodsAnswered > 0 ? Math.round(completenessSum / CAPSTONE_INPUTS.length) : 0;
  document.getElementById('capTotal').textContent = total.toLocaleString();
  document.getElementById('capMeter').style.width = compPct + '%';
  document.getElementById('capMeterLabel').textContent = `${methodsAnswered}/${CAPSTONE_INPUTS.length} answered · weighted completeness ${compPct}%`;

  const dqAvg = dqCount > 0 ? (dqSum / dqCount) : null;
  document.getElementById('capDQ').textContent = dqAvg !== null ? dqAvg.toFixed(1) : '—';
  document.getElementById('capDQLabel').textContent = dqAvg !== null
    ? (dqAvg <= 2 ? 'verified-actuals dominant' : dqAvg <= 3 ? 'physical-data dominant' : 'estimate-dominated baseline')
    : 'pick methods + DQ to score';

  let badge = 'bronze', name = 'Bronze · First-year baseline';
  let body = 'Estimate-heavy. Use as starting baseline; year 2 should bring methods + DQ up.';
  if (methodsAnswered === CAPSTONE_INPUTS.length) {
    if (dqAvg !== null && dqAvg <= 2.5 && compPct >= 90) {
      badge = 'gold'; name = 'Gold · SBTi-ready';
      body = 'Verified actuals dominant, completeness ≥ 90 %. Defensible for SBTi tracking, IFRS S2 disclosure and CDP A-list.';
    } else if (dqAvg !== null && dqAvg <= 3.5 && compPct >= 75) {
      badge = 'silver'; name = 'Silver · Disclosure-ready';
      body = 'Physical-data dominant. Good for CDP and IFRS S2 with method footnotes; SBTi advisable on Cat 1 first.';
    }
  }
  document.getElementById('capVerdict').innerHTML = `
    <div class="capstone-badge capstone-badge--${badge}">${name}</div>
    ${body}
  `;
}
</script>
