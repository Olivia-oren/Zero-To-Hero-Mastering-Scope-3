<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scope 3 Decoded — From Boundaries to All 15 Categories</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-primary: #f8fafc;
  --bg-secondary: #f1f5f9;
  --bg-tertiary: #e2e8f0;
  --bg-card: #ffffff;
  --bg-dark: #0f172a;
  --bg-dark-2: #172033;
  --bg-dark-card: rgba(255,255,255,0.04);

  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;

  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: #eff6ff;
  --accent-glow: rgba(37,99,235,0.15);

  --teal: #00b39f;
  --teal-light: #ecfdf5;
  --violet: #7c3aed;
  --violet-light: #f5f3ff;

  --green: #16a34a;
  --green-light: #f0fdf4;
  --green-border: #bbf7d0;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --red: #dc2626;
  --red-light: #fef2f2;

  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 12px rgba(15,23,42,0.06);
  --shadow-lg: 0 12px 32px rgba(15,23,42,0.08);
  --shadow-glow: 0 0 0 4px var(--accent-glow);

  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100vw; height: 100vh; overflow: hidden; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ============== DECK CONTAINER ============== */
.deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
.slide {
  position: absolute; inset: 0;
  width: 100vw; height: 100vh;
  padding: 56px 80px 80px;
  background: var(--bg-primary);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.slide.active { opacity: 1; pointer-events: auto; z-index: 2; }
.slide--dark { background: var(--bg-dark); color: #fff; }
.slide--dark .text-secondary { color: rgba(255,255,255,0.7); }
.slide__inner { width: 100%; max-width: 1240px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; }
.slide__inner--case {
  max-width: 1180px;
  justify-content: center;
  gap: 18px;
}
.slide__inner--case .case-detail {
  padding: 30px 36px 28px;
}
.slide__inner--case .case-row {
  font-size: 14.5px;
  padding: 14px 0;
}
.slide__inner--case .case-row__value { line-height: 1.6; }
.slide__inner--case .case-row__label { font-size: 11.5px; padding-top: 14px; }
.slide__inner--case .case-detail__lesson {
  padding: 20px 24px;
  font-size: 14.5px;
}
.slide__inner--case .case-deep { gap: 16px; }
.slide__inner--case .case-deep__panel { padding: 20px 24px; }
.slide__inner--case .case-deep__h { font-size: 20px; margin-bottom: 8px; }
.slide__inner--case .method-grid__label,
.slide__inner--case .method-grid__value {
  font-size: 13.5px; padding: 13px 0;
}
.slide__inner--case .numbers-hero__card {
  padding: 22px 24px;
}
.slide__inner--case .numbers-hero__value { font-size: 38px; }
.slide__inner--case .target-banner { padding: 22px 26px; }
.slide__inner--case .target-banner__title { font-size: 24px; }
.slide__inner--case .lever-card { padding: 14px 18px; }
.slide__inner--case .lever-card__title { font-size: 16px; }
.slide__inner--case .lever-card__body { font-size: 13px; }
.slide__inner--case .quote-card { padding: 16px 22px; }
.slide__inner--case .quote-card__text { font-size: 17px; }
.slide__inner--case .case-crown { padding: 12px 18px; }
.slide__inner--case .case-crown__name { font-size: 24px; }
.slide__inner--case .case-crown__logo { width: 50px; height: 50px; }
.slide__inner--case .use-case-chat { padding: 22px 24px 18px; }

/* ============== CHROME ============== */
.progress-bar {
  position: fixed; top: 0; left: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  z-index: 1000; transition: width .4s ease; width: 0%;
}
.chrome-top {
  position: fixed; top: 0; left: 0; right: 0; z-index: 90;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  pointer-events: none;
}
.chrome-top > * { pointer-events: auto; }
.chrome-brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display); font-size: 15px; color: var(--text-primary);
  background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
  padding: 6px 14px 6px 6px; border-radius: 999px;
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.slide--dark ~ .chrome-top .chrome-brand { background: rgba(15,23,42,0.7); color: #fff; border-color: rgba(255,255,255,0.1); }
.chrome-brand__mark {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  display: grid; place-items: center; color: #fff; font-weight: 700;
  font-family: var(--font-body); font-size: 12px;
}
.chrome-actions { display: flex; gap: 8px; align-items: center; }

/* ============== TOP NAV (Lovable-style) ============== */
.chrome-nav {
  display: flex; gap: 4px; align-items: center;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  padding: 4px;
  border-radius: 999px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.chrome-nav__link {
  background: transparent; border: none;
  padding: 7px 14px; border-radius: 999px;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer;
  transition: all 0.18s ease; white-space: nowrap;
}
.chrome-nav__link:hover {
  color: var(--text-primary); background: var(--bg-secondary);
}
.chrome-nav__link.active {
  background: var(--bg-dark); color: #fff;
  box-shadow: var(--shadow-sm);
}
.slide--dark ~ .chrome-top .chrome-nav,
.slide--dark.active ~ * .chrome-nav {
  background: rgba(15,23,42,0.7); border-color: rgba(255,255,255,0.1);
}
.chrome-nav__cta {
  background: var(--bg-dark); color: #fff; border: none;
  padding: 8px 18px; border-radius: 999px;
  font-family: var(--font-body); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.18s ease;
  display: inline-flex; align-items: center; gap: 6px;
}
.chrome-nav__cta:hover { background: var(--accent); transform: translateY(-1px); }
@media (max-width: 1100px) {
  .chrome-nav__link { padding: 6px 10px; font-size: 12px; }
}
@media (max-width: 900px) {
  .chrome-nav { display: none; }
}

/* ============== LOVABLE-STYLE HERO ============== */
.lov-hero {
  width: 100%; max-width: 1100px; margin: 0 auto;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: 30px 0 40px;
  flex: 1; justify-content: center;
}
.lov-hero__badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: 999px;
  background: rgba(37,99,235,0.12);
  border: 1px solid rgba(37,99,235,0.3);
  color: var(--accent);
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; margin-bottom: 28px;
}
.lov-hero__badge-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent);
}
.lov-hero__title {
  font-family: var(--font-display);
  font-size: clamp(40px, 5vw, 66px);
  line-height: 1.04; letter-spacing: -0.022em;
  font-weight: 400; max-width: 1100px;
  margin: 0 0 24px; color: var(--text-primary);
  white-space: nowrap;
}
.lov-hero__title-em { white-space: normal; }
@media (max-width: 1100px) {
  .lov-hero__title { white-space: normal; }
}
.lov-hero__title-em {
  display: block; color: var(--text-secondary);
  font-size: 0.62em; margin-top: 8px;
  font-style: italic;
}
.lov-hero__title-em em {
  color: var(--teal); font-style: italic;
}
.lov-hero__sub {
  font-size: clamp(15px, 1.4vw, 19px);
  color: var(--text-secondary); max-width: 720px;
  margin: 0 0 36px; line-height: 1.55;
}
.lov-hero__metrics {
  display: flex; gap: 12px; flex-wrap: wrap;
  justify-content: center; margin-bottom: 36px;
}
.lov-hero__metric {
  display: flex; align-items: baseline; gap: 6px;
  padding: 9px 18px; border-radius: 999px;
  background: var(--bg-card); border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.lov-hero__metric b {
  font-family: var(--font-display);
  font-size: 22px; color: var(--text-primary); font-weight: 400;
}
.lov-hero__metric span {
  font-size: 12px; color: var(--text-muted);
  font-weight: 500; letter-spacing: 0.02em;
}
.lov-hero__cta {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.lov-hero__cta .btn--primary {
  background: var(--bg-dark); color: #fff;
  padding: 14px 26px; border-radius: 12px; border: none;
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.18s ease;
  display: inline-flex; align-items: center; gap: 10px;
}
.lov-hero__cta .btn--primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(15,23,42,0.18);
  background: var(--accent);
}
.lov-hero__cta .btn--ghost {
  background: transparent; color: var(--text-primary);
  padding: 14px 22px; border-radius: 12px;
  border: 1px solid var(--border);
  font-family: var(--font-body); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: all 0.18s ease;
  display: inline-flex; align-items: center; gap: 8px;
}
.lov-hero__cta .btn--ghost:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-light);
}

/* ============== LOVABLE-STYLE SECTION ============== */
.lov-section {
  width: 100%; max-width: 1100px; margin: 0 auto;
  padding: 8px 0 24px;
}
.lov-section__head {
  text-align: center; margin-bottom: 32px;
  display: flex; flex-direction: column; align-items: center;
}
.lov-section__head .eyebrow { margin-bottom: 12px; }
.lov-section__head h2 {
  font-family: var(--font-display);
  font-size: clamp(32px, 3.6vw, 46px);
  line-height: 1.1; letter-spacing: -0.015em;
  font-weight: 400; margin: 0 0 12px; max-width: 760px;
}
.lov-section__head h2 em { color: var(--teal); font-style: italic; }
.lov-section__head p {
  font-size: 16px; color: var(--text-secondary);
  max-width: 640px; margin: 0; line-height: 1.55;
}
.lov-section__sub-head {
  text-align: center; margin: 36px 0 22px;
}
.lov-section__sub-head .eyebrow { margin-bottom: 8px; }
.lov-section__sub-head h3 {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 400; margin: 0;
}

.lov-tab-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(4, 1fr);
}
.lov-tab-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 22px 22px 24px;
  display: flex; flex-direction: column;
  transition: all 0.2s ease; position: relative;
  overflow: hidden;
}
.lov-tab-card:hover {
  border-color: var(--accent); transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.lov-tab-card__num {
  position: absolute; top: 16px; right: 18px;
  font-family: var(--font-display);
  font-size: 13px; color: var(--text-muted);
  letter-spacing: 0.1em;
}
.lov-tab-card__icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--accent-light); color: var(--accent);
  display: grid; place-items: center; font-size: 22px;
  margin-bottom: 14px;
}
.lov-tab-card:nth-child(2) .lov-tab-card__icon { background: #ecfdf5; color: #00b39f; }
.lov-tab-card:nth-child(3) .lov-tab-card__icon { background: #fef3c7; color: #b45309; }
.lov-tab-card:nth-child(4) .lov-tab-card__icon { background: #f5f3ff; color: #7c3aed; }
.lov-tab-card h3 {
  font-family: var(--font-display); font-size: 19px;
  font-weight: 400; margin: 0 0 6px;
}
.lov-tab-card p {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.55; margin: 0;
}
@media (max-width: 900px) { .lov-tab-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px) { .lov-tab-grid { grid-template-columns: 1fr; } }

.lov-cast-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(5, 1fr);
}
.lov-cast-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 14px;
  text-align: center; transition: all 0.2s ease;
}
.lov-cast-card:hover {
  border-color: var(--accent); transform: translateY(-2px);
  box-shadow: var(--shadow-sm);
}
.lov-cast-card__avatar {
  width: 52px; height: 52px; border-radius: 14px;
  border: 2px solid; display: grid; place-items: center;
  font-size: 26px; margin: 0 auto 10px;
  background: #fff;
}
.lov-cast-card__name {
  font-family: var(--font-display); font-size: 17px;
  font-weight: 400; line-height: 1.1; margin-bottom: 4px;
}
.lov-cast-card__role {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-muted);
}
@media (max-width: 900px) { .lov-cast-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 540px) { .lov-cast-grid { grid-template-columns: repeat(2, 1fr); } }

/* Cover slide override — dark background with subtle accent gradients */
.slide.cover-light {
  background:
    radial-gradient(ellipse at top left, rgba(37,99,235,0.06), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(0,179,159,0.06), transparent 50%),
    var(--bg-primary);
}
.slide--dark.active {
  background:
    radial-gradient(ellipse at top left, rgba(37,99,235,0.18), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(0,179,159,0.18), transparent 50%),
    var(--bg-dark);
}

/* Dark-mode hero overrides */
.slide--dark .lov-hero__title { color: #fff; }
.slide--dark .lov-hero__title-em { color: rgba(255,255,255,0.55); }
.slide--dark .lov-hero__title-em em { color: #6ee7b7; }
.slide--dark .lov-hero__sub { color: rgba(255,255,255,0.72); }
.slide--dark .lov-hero__badge {
  background: rgba(37,99,235,0.18);
  border-color: rgba(37,99,235,0.4);
  color: #93c5fd;
}
.slide--dark .lov-hero__badge-dot { background: #93c5fd; box-shadow: 0 0 8px #93c5fd; }
.slide--dark .lov-hero__metric {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.12);
  box-shadow: none;
}
.slide--dark .lov-hero__metric b { color: #fff; }
.slide--dark .lov-hero__metric span { color: rgba(255,255,255,0.6); }
.slide--dark .lov-hero__cta .btn--primary {
  background: #fff; color: var(--bg-dark);
}
.slide--dark .lov-hero__cta .btn--primary:hover {
  background: var(--accent); color: #fff;
  box-shadow: 0 12px 28px rgba(37,99,235,0.35);
}
.slide--dark .lov-hero__cta .btn--ghost {
  background: transparent; color: #fff;
  border-color: rgba(255,255,255,0.25);
}
.slide--dark .lov-hero__cta .btn--ghost:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.4);
  color: #fff;
}
/* Top nav on dark slides */
.slide--dark.active ~ .chrome-top .chrome-nav,
body:has(.slide--dark.active) .chrome-nav {
  background: rgba(15,23,42,0.7);
  border-color: rgba(255,255,255,0.12);
}
body:has(.slide--dark.active) .chrome-nav__link {
  color: rgba(255,255,255,0.7);
}
body:has(.slide--dark.active) .chrome-nav__link:hover {
  color: #fff; background: rgba(255,255,255,0.08);
}
body:has(.slide--dark.active) .chrome-nav__link.active {
  background: #fff; color: var(--bg-dark);
}
body:has(.slide--dark.active) .chrome-brand {
  background: rgba(15,23,42,0.7); color: #fff;
  border-color: rgba(255,255,255,0.12);
}

/* ============== 8-STEP CURRICULUM CARDS ============== */
.step-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(2, 1fr);
  max-width: 1100px; margin: 0 auto;
}
.step-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px 16px;
  cursor: pointer; transition: all 0.2s ease;
  display: flex; flex-direction: column; gap: 10px;
  position: relative;
}
.step-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.step-card__head { display: flex; gap: 16px; align-items: flex-start; }
.step-card__num {
  font-family: var(--font-display);
  font-size: 38px; line-height: 1;
  color: var(--accent); flex-shrink: 0;
}
.step-card__title {
  font-family: var(--font-display);
  font-size: 17px; line-height: 1.2;
  margin-bottom: 4px;
}
.step-card__meta {
  font-size: 11px; color: var(--text-muted);
  font-family: var(--font-mono);
}
.step-card__desc {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.55;
}
.step-card__topics-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 4px; margin-top: 4px;
}
.step-card__topics ul { margin: 0; padding-left: 18px; }
.step-card__topics li {
  font-size: 12.5px; color: var(--text-secondary);
  line-height: 1.5; margin-bottom: 2px;
}
.step-card__footer {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 10px; margin-top: auto;
  border-top: 1px solid var(--border-light);
  font-size: 12px;
}
.step-card__activity {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 999px;
  background: var(--accent-light); color: var(--accent);
  font-size: 10.5px; font-weight: 600;
}
.step-card__open {
  font-weight: 600; color: var(--text-secondary);
  font-size: 12px; transition: color 0.2s ease;
}
.step-card:hover .step-card__open { color: var(--accent); }

.lov-start-btn {
  background: var(--bg-dark); color: #fff;
  padding: 14px 28px; border-radius: 12px;
  border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.2s ease;
}
.lov-start-btn:hover {
  background: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(37,99,235,0.25);
}

@media (max-width: 900px) { .step-grid { grid-template-columns: 1fr; } }

/* ============== REAL CASES — LOGO GRID OVERVIEW ============== */
.case-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(4, 1fr);
  max-width: 1180px; margin: 0 auto;
}
.case-grid__card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 22px 18px 18px;
  cursor: pointer; transition: all 0.2s ease;
  display: flex; flex-direction: column;
  text-align: center; position: relative;
}
.case-grid__card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.case-grid__num {
  position: absolute; top: 10px; left: 12px;
  font-family: var(--font-display);
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 0.12em;
}
.case-grid__logo {
  width: 64px; height: 64px; border-radius: 14px;
  background: #fff; border: 1px solid var(--border);
  margin: 0 auto 12px;
  display: grid; place-items: center;
  padding: 9px; overflow: hidden;
}
.case-grid__logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
.case-grid__logo-fallback {
  font-family: var(--font-display); font-size: 24px;
  color: var(--text-primary); line-height: 1;
  display: none;
}
.case-grid__name {
  font-family: var(--font-display); font-size: 19px;
  font-weight: 400; margin-bottom: 4px; line-height: 1.1;
}
.case-grid__tag {
  font-size: 11.5px; color: var(--text-muted);
  line-height: 1.45; margin-bottom: 14px; min-height: 32px;
}
.case-grid__cta {
  margin-top: auto; padding-top: 12px;
  border-top: 1px solid var(--border-light);
  font-size: 12px; color: var(--accent); font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  transition: gap 0.18s ease;
}
.case-grid__card:hover .case-grid__cta { gap: 7px; }
.case-grid__parts {
  display: flex; gap: 4px; justify-content: center;
  margin-top: 6px;
}
.case-grid__part-btn {
  width: 22px; height: 22px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg-card);
  cursor: pointer; font-size: 10.5px; color: var(--text-muted);
  display: grid; place-items: center;
  transition: all 0.18s ease;
  font-family: var(--font-body); font-weight: 600;
}
.case-grid__part-btn:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-light);
}
@media (max-width: 1024px) { .case-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 740px)  { .case-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .case-grid { grid-template-columns: 1fr; } }

/* ============== CASE BANNER (announcement slide before each company) ============== */
.slide__inner.case-banner {
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}
.slide__inner.case-banner::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 0%, var(--brand-tint, rgba(37,99,235,0.10)), transparent 55%),
    radial-gradient(ellipse at 70% 100%, var(--brand-tint, rgba(0,179,159,0.08)), transparent 55%);
  pointer-events: none; z-index: 0;
}
.case-banner__inner {
  position: relative; z-index: 1;
  max-width: 760px;
  display: flex; flex-direction: column;
  align-items: center; gap: 16px;
}
.case-banner__num {
  font-size: 11px;
  font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.case-banner__logo {
  width: 120px; height: 120px;
  border-radius: 28px;
  background: #fff;
  border: 1px solid var(--border);
  display: grid; place-items: center;
  padding: 22px;
  box-shadow: 0 18px 44px rgba(15,23,42,0.10);
  margin-bottom: 6px;
}
.case-banner__logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
.case-banner__logo-fallback {
  font-family: var(--font-display);
  font-size: 56px; line-height: 1;
  color: var(--text-primary);
  display: none;
}
.case-banner__name {
  font-family: var(--font-display);
  font-size: clamp(54px, 8vw, 92px);
  font-weight: 400; line-height: 1;
  letter-spacing: -0.022em;
  margin: 0; color: var(--text-primary);
}
.case-banner__tag {
  font-size: 12px; letter-spacing: 0.14em;
  text-transform: uppercase; font-weight: 700;
  color: var(--brand-strong, var(--accent));
  margin-top: 4px;
}
.case-banner__hook {
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark-2));
  color: #fff;
  padding: 18px 26px;
  border-radius: 16px;
  max-width: 560px;
  margin-top: 12px;
  display: flex; flex-direction: column; gap: 4px;
  align-items: center;
  box-shadow: 0 12px 32px rgba(15,23,42,0.18);
}
.case-banner__hook-value {
  font-family: var(--font-display);
  font-size: 36px; line-height: 1;
  color: #6ee7b7; font-weight: 400;
}
.case-banner__hook-unit {
  font-size: 12px; color: rgba(255,255,255,0.7);
  font-family: var(--font-mono);
}
.case-banner__hook-label {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}
.case-banner__cta {
  background: var(--bg-dark); color: #fff;
  padding: 14px 28px; border-radius: 12px;
  border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 8px;
  transition: all 0.2s ease;
  margin-top: 16px;
}
.case-banner__cta:hover {
  background: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(37,99,235,0.25);
}
.case-banner__skip {
  background: transparent; color: var(--text-muted);
  border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 12px;
  margin-top: 6px;
  text-decoration: underline; text-underline-offset: 3px;
}
.case-banner__skip:hover { color: var(--accent); }
.chrome-btn {
  padding: 8px 14px; border-radius: 999px;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
  border: 1px solid var(--border); cursor: pointer;
  font-family: var(--font-body); font-size: 13px; font-weight: 500;
  color: var(--text-secondary); transition: all .2s ease;
  display: inline-flex; align-items: center; gap: 6px;
  box-shadow: var(--shadow-sm);
}
.chrome-btn:hover { color: var(--accent); border-color: var(--accent); }
.slide-counter {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  z-index: 90;
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; border-radius: 999px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  font-size: 12px; color: var(--text-secondary); font-weight: 500;
}
.slide-counter__nav {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; font-size: 12px; color: var(--text-secondary);
  display: grid; place-items: center;
}
.slide-counter__nav:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.slide-counter__nav:disabled { opacity: 0.3; cursor: not-allowed; }
.click-zone {
  position: fixed; top: 0; bottom: 0; width: 12%; z-index: 50;
  cursor: pointer;
}
.click-zone--prev { left: 0; }
.click-zone--next { right: 0; }
.click-zone:hover::after {
  content: ''; position: absolute; top: 50%; transform: translateY(-50%);
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(15,23,42,0.06); display: grid; place-items: center;
  font-size: 18px;
}
.click-zone--prev:hover::after { content: '‹'; left: 16px; padding-bottom: 4px; }
.click-zone--next:hover::after { content: '›'; right: 16px; padding-bottom: 4px; }

.dot-rail {
  position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
  z-index: 80; display: flex; flex-direction: column; gap: 6px;
  max-height: 70vh; overflow-y: auto; padding: 12px 6px;
  background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
  border: 1px solid var(--border); border-radius: 999px;
  box-shadow: var(--shadow-sm);
}
.dot-rail::-webkit-scrollbar { display: none; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--bg-tertiary); cursor: pointer; flex-shrink: 0;
  transition: all .2s ease;
}
.dot:hover { background: var(--text-muted); }
.dot.active { background: var(--accent); transform: scale(1.4); }

/* ============== TYPE ============== */
.eyebrow {
  font-size: 13px; font-weight: 600; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 10px;
}
.slide--dark .eyebrow { color: #6ee7b7; }
.h-xl {
  font-family: var(--font-display);
  font-size: clamp(48px, 5.6vw, 76px); font-weight: 400;
  line-height: 1.05; letter-spacing: -0.02em;
}
.h-lg {
  font-family: var(--font-display);
  font-size: clamp(36px, 4vw, 52px); font-weight: 400;
  line-height: 1.1; letter-spacing: -0.01em;
}
.h-md {
  font-family: var(--font-display);
  font-size: clamp(26px, 2.8vw, 36px); font-weight: 400;
  line-height: 1.15;
}
.h-sm {
  font-family: var(--font-display);
  font-size: clamp(20px, 2vw, 24px); font-weight: 400;
  line-height: 1.2;
}
.text-lg { font-size: 19px; color: var(--text-secondary); }
.text-md { font-size: 16px; color: var(--text-secondary); }
.text-sm { font-size: 14px; color: var(--text-secondary); }
.accent { color: var(--accent); }
em { color: var(--teal); font-style: italic; }
.slide--dark em { color: #6ee7b7; }

/* ============== COVER ============== */
.cover {
  align-items: center; justify-content: center; text-align: center;
  background:
    radial-gradient(ellipse at top left, rgba(37,99,235,0.18), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(0,179,159,0.18), transparent 50%),
    var(--bg-dark);
  color: #fff;
}
.cover__badge {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 8px 16px; border-radius: 999px;
  background: rgba(37,99,235,0.18); border: 1px solid rgba(37,99,235,0.35);
  color: #93c5fd; font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; margin-bottom: 32px;
}
.cover__badge-dot { width: 8px; height: 8px; border-radius: 50%; background: #93c5fd; box-shadow: 0 0 10px #93c5fd; }
.cover__title { color: #fff; max-width: 1000px; margin-bottom: 24px; }
.cover__sub { font-size: 19px; color: rgba(255,255,255,0.7); max-width: 720px; margin-bottom: 36px; }
.cover__meta { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 36px; }
.cover__meta b { color: rgba(255,255,255,0.85); font-weight: 600; }
.cover__cta { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.btn {
  padding: 14px 24px; border-radius: 12px; cursor: pointer; border: none;
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 10px;
  transition: all .2s ease;
}
.btn--primary { background: #fff; color: var(--bg-dark); }
.btn--primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,255,255,0.2); }
.btn--ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.25); }
.btn--ghost:hover { background: rgba(255,255,255,0.08); }
.btn--accent { background: var(--accent); color: #fff; }
.btn--accent:hover { background: var(--accent-hover); }
.btn--small { padding: 8px 14px; font-size: 13px; }

/* ============== STANDARD SLIDE LAYOUT ============== */
.slide-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; gap: 24px; flex-shrink: 0;
}
.slide-head__left { min-width: 0; }
.slide-step {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 6px;
}
.slide-step__chip {
  padding: 3px 10px; border-radius: 999px;
  background: var(--accent-light); color: var(--accent);
  font-weight: 700;
}
.slide-title { font-family: var(--font-display); font-size: clamp(24px, 2.6vw, 30px); line-height: 1.2; }
.tab-strip {
  display: flex; gap: 4px;
  padding: 4px; background: var(--bg-secondary); border-radius: 12px;
  border: 1px solid var(--border);
}
.tab-strip__btn {
  padding: 8px 14px; border: none; background: transparent;
  border-radius: 8px; font-family: var(--font-body); font-size: 13px;
  font-weight: 600; color: var(--text-muted); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
}
.tab-strip__btn.active { background: #fff; color: var(--accent); box-shadow: var(--shadow-sm); }

/* ============== ROADMAP SLIDE ============== */
.roadmap-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 14px; flex: 1; min-height: 0;
}
.level {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px; cursor: pointer;
  transition: all .2s ease; display: grid;
  grid-template-columns: 44px 1fr; gap: 12px; align-items: center;
}
.level:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.level__num {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg-dark); color: #fff;
  display: grid; place-items: center;
  font-family: var(--font-display); font-size: 18px;
}
.level__tier {
  font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 2px;
}
.level__tier--beg { color: var(--teal); }
.level__tier--fou { color: var(--accent); }
.level__tier--pra { color: var(--violet); }
.level__tier--adv { color: var(--orange); }
.level__tier--sme { color: var(--green); }
.level__title { font-family: var(--font-display); font-size: 16px; line-height: 1.15; margin-bottom: 4px; }
.level__meta { display: flex; gap: 6px; font-size: 11px; color: var(--text-muted); align-items: center; flex-wrap: wrap; }
.level__pill { padding: 2px 8px; border-radius: 999px; background: var(--accent-light); color: var(--accent); font-weight: 600; }
.level__rating { display: inline-flex; gap: 2px; }
.level__rating-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--bg-tertiary); }
.level__rating-dot--filled { background: var(--accent); }

/* ============== CHAT-FLOW (animated reveal) ============== */
.chat-flow {
  display: flex; flex-direction: column;
  gap: 14px; padding: 8px 6px 12px;
  position: relative;
  scroll-behavior: smooth;
}
.chat-msg {
  display: flex; gap: 12px; max-width: 80%;
  align-items: flex-start;
  opacity: 0; transform: translateY(20px);
  transition: opacity .35s ease, transform .35s ease;
}
.chat-msg.visible { opacity: 1; transform: translateY(0); }
.chat-msg[data-side="right"] { align-self: flex-end; flex-direction: row-reverse; }
.chat-msg[data-side="left"]  { align-self: flex-start; }
.chat-msg__col {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; flex-shrink: 0; width: 56px;
}
.chat-msg__avatar {
  width: 48px; height: 48px; border-radius: 12px;
  display: grid; place-items: center; font-size: 22px;
  background: #fff; border: 2px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.slide--dark .chat-msg__avatar { background: rgba(255,255,255,0.06); }
.chat-msg__speaker {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-muted); text-align: center; line-height: 1.1;
}
.slide--dark .chat-msg__speaker { color: rgba(255,255,255,0.55); }
.chat-msg__bubble {
  padding: 12px 16px; border-radius: 16px;
  font-size: 14px; line-height: 1.55;
  color: var(--text-primary);
  flex: 1; min-height: 40px;
  word-wrap: break-word; overflow-wrap: anywhere;
}
.slide--dark .chat-msg__bubble { color: rgba(255,255,255,0.92); }
.chat-msg[data-side="left"]  .chat-msg__bubble { border-bottom-left-radius: 6px; }
.chat-msg[data-side="right"] .chat-msg__bubble { border-bottom-right-radius: 6px; }
.chat-msg__cursor {
  display: inline-block; width: 2px; height: 1em;
  background: currentColor; margin-left: 2px;
  vertical-align: text-bottom;
  animation: blinkCursor 0.9s step-end infinite;
}
@keyframes blinkCursor { 50% { opacity: 0; } }

.typing-indicator {
  display: flex; gap: 12px; max-width: 80%;
  align-items: flex-start;
  animation: chatIn .25s ease;
}
@keyframes chatIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.typing-indicator[data-side="right"] { align-self: flex-end; flex-direction: row-reverse; }
.typing-indicator[data-side="left"]  { align-self: flex-start; }
.typing-indicator__bubble {
  padding: 14px 18px; border-radius: 16px;
  display: flex; gap: 5px; align-items: center;
}
.typing-indicator__dot {
  width: 7px; height: 7px; border-radius: 50%;
  opacity: 0.4;
  animation: typingPulse 1s infinite ease-in-out;
}
.typing-indicator__dot:nth-child(2) { animation-delay: 0.18s; }
.typing-indicator__dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes typingPulse {
  0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
  30%           { opacity: 1; transform: scale(1.25); }
}

.replay-btn {
  position: absolute; top: 10px; right: 10px; z-index: 5;
  padding: 7px 14px; font-size: 12px; font-weight: 600;
  font-family: var(--font-body);
  background: rgba(255,255,255,0.92); color: var(--text-primary);
  border: 1px solid var(--border); border-radius: 999px;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.2s ease; box-shadow: var(--shadow-sm);
}
.replay-btn:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.slide--dark .replay-btn {
  background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2);
}
.slide--dark .replay-btn:hover { background: var(--accent); }

/* ============== LEARN ============== */
.scorecard {
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark-2));
  color: #fff; border-radius: 14px; padding: 18px 22px;
  display: grid; grid-template-columns: 1fr auto 1fr auto;
  gap: 18px; align-items: center; margin-bottom: 18px; flex-shrink: 0;
}
.scorecard__label { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
.scorecard__value { font-family: var(--font-display); font-size: 36px; line-height: 1; }
.scorecard__value-from { color: rgba(255,255,255,0.4); }
.scorecard__value-to { color: #6ee7b7; }
.scorecard__arrow { font-size: 24px; color: rgba(255,255,255,0.5); }
.scorecard__caption { font-size: 13px; color: rgba(255,255,255,0.7); max-width: 220px; }

.concepts {
  display: grid; gap: 14px;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  flex: 1; min-height: 0;
}
.concept {
  padding: 18px 20px; border-radius: 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.concept__icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: grid; place-items: center; font-size: 18px;
  background: var(--accent-light); color: var(--accent);
  margin-bottom: 10px;
}
.concept__title { font-family: var(--font-display); font-size: 18px; margin-bottom: 6px; }
.concept__body { font-size: 13.5px; color: var(--text-secondary); flex: 1; }
.concept__body p { margin-bottom: 6px; }
.concept__body p:last-child { margin-bottom: 0; }
.concept__callout {
  margin-top: 10px; padding: 10px 12px;
  background: var(--accent-light); border-left: 3px solid var(--accent);
  border-radius: 8px; font-size: 12px; color: #1e3a8a; line-height: 1.5;
}
.concept__callout--warn { background: var(--orange-light); border-color: var(--orange); color: #7c2d12; }
.concept__callout-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; margin-bottom: 3px;
}

/* ============== INSIGHT FLIP CARDS ============== */
.flip-grid {
  display: grid; gap: 14px;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: 1fr;
  flex: 1; min-height: 0;
}
.flip-card { perspective: 1200px; cursor: pointer; min-height: 180px; }
.flip-card__inner {
  position: relative; width: 100%; height: 100%;
  transition: transform .65s cubic-bezier(.4,.2,.2,1);
  transform-style: preserve-3d; min-height: 180px;
}
.flip-card.flipped .flip-card__inner { transform: rotateY(180deg); }
.flip-card__face {
  position: absolute; inset: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 14px; padding: 18px 20px;
  display: flex; flex-direction: column; justify-content: space-between;
  border: 1px solid var(--border);
}
.flip-card__face--front {
  background: var(--bg-card);
  background-image: linear-gradient(135deg, rgba(37,99,235,0.04), rgba(0,179,159,0.04));
}
.flip-card__face--back {
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark-2));
  color: #fff; transform: rotateY(180deg); border-color: var(--bg-dark);
}
.flip-card__label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
}
.flip-card__face--back .flip-card__label { color: #6ee7b7; }
.flip-card__q { font-family: var(--font-display); font-size: 16px; line-height: 1.3; color: var(--text-primary); }
.flip-card__a-headline { font-family: var(--font-display); font-size: 19px; line-height: 1.2; color: #fff; margin-bottom: 6px; }
.flip-card__a-detail { font-size: 13px; color: rgba(255,255,255,0.75); }
.flip-card__hint { font-size: 11px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; }
.flip-card__hint::before { content: '↻'; }

/* ============== ACTIVITIES ============== */
.activity { background: var(--bg-secondary); border-radius: 14px; padding: 22px; flex: 1; overflow-y: auto; }
.activity__intro {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; margin-bottom: 16px;
  font-size: 14px; color: var(--text-secondary);
}
.activity__title { font-family: var(--font-display); font-size: 22px; margin-bottom: 6px; line-height: 1.2; }

.mcq-options { display: grid; gap: 10px; margin-bottom: 12px; }
.mcq-option {
  padding: 12px 16px; border: 2px solid var(--border);
  border-radius: 10px; background: var(--bg-card); cursor: pointer;
  transition: all .2s ease; font-size: 14px; color: var(--text-primary);
  display: flex; gap: 12px; align-items: center;
  text-align: left; font-family: var(--font-body); width: 100%;
}
.mcq-option:hover { border-color: var(--accent); }
.mcq-option__letter {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg-secondary); color: var(--text-secondary);
  display: grid; place-items: center; font-weight: 700; font-size: 12px;
  flex-shrink: 0;
}
.mcq-option.correct { border-color: var(--green); background: var(--green-light); }
.mcq-option.correct .mcq-option__letter { background: var(--green); color: #fff; }
.mcq-option.incorrect { border-color: var(--red); background: var(--red-light); }
.mcq-option.incorrect .mcq-option__letter { background: var(--red); color: #fff; }
.mcq-option:disabled { cursor: default; }

.feedback { margin-top: 14px; padding: 14px 16px; border-radius: 10px; font-size: 13.5px; display: none; line-height: 1.6; }
.feedback.show { display: block; animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.feedback--correct { background: var(--green-light); border-left: 4px solid var(--green); color: #064e3b; }
.feedback--incorrect { background: var(--red-light); border-left: 4px solid var(--red); color: #7f1d1d; }
.feedback__label { font-weight: 700; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }

/* matching */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.match-col__title { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.match-list { display: flex; flex-direction: column; gap: 8px; }
.match-item {
  padding: 12px 14px; border: 2px solid var(--border);
  background: var(--bg-card); border-radius: 10px; cursor: pointer;
  font-size: 13px; transition: all .2s ease; line-height: 1.4;
  text-align: left; font-family: var(--font-body);
}
.match-item:hover { border-color: var(--accent); }
.match-item.selected { border-color: var(--accent); background: var(--accent-light); }
.match-item.matched-ok { border-color: var(--green); background: var(--green-light); cursor: default; }
.match-item.matched-bad { border-color: var(--red); background: var(--red-light); }

/* fill */
.fill-row {
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  padding: 12px 14px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 8px; font-size: 13.5px;
}
.fill-row__text { flex: 1; min-width: 200px; }
.fill-row__select {
  padding: 7px 12px; border: 2px solid var(--border);
  border-radius: 8px; font-family: var(--font-body); font-size: 13px;
  background: #fff; cursor: pointer;
}
.fill-row__select.correct { border-color: var(--green); background: var(--green-light); }
.fill-row__select.incorrect { border-color: var(--red); background: var(--red-light); }

/* sort */
.dragsort-pool {
  padding: 14px; background: var(--bg-card); border: 1px dashed var(--border); border-radius: 12px;
  min-height: 60px;
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.dragsort-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.dragsort-bucket {
  padding: 14px; border: 2px dashed var(--border);
  border-radius: 12px; min-height: 200px;
  background: var(--bg-card);
}
.dragsort-bucket__title { font-family: var(--font-display); font-size: 16px; margin-bottom: 8px; }
.dragsort-bucket--up { border-color: var(--teal); }
.dragsort-bucket--up .dragsort-bucket__title { color: var(--teal); }
.dragsort-bucket--down { border-color: var(--orange); }
.dragsort-bucket--down .dragsort-bucket__title { color: var(--orange); }
.dragsort-tile {
  padding: 6px 12px; background: #fff; border: 1px solid var(--border);
  border-radius: 999px; font-size: 12px; cursor: pointer;
  user-select: none; transition: all .2s ease; font-family: var(--font-body);
}
.dragsort-tile:hover { border-color: var(--accent); }
.dragsort-tile--ok { background: var(--green-light); border-color: var(--green); color: #064e3b; }
.dragsort-tile--bad { background: var(--red-light); border-color: var(--red); color: #7f1d1d; }

/* tf */
.tf-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 8px; gap: 14px;
}
.tf-row__statement { font-size: 13.5px; flex: 1; }
.tf-row__btns { display: flex; gap: 6px; }
.tf-btn {
  padding: 7px 14px; border: 2px solid var(--border);
  border-radius: 8px; background: var(--bg-secondary);
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s ease; color: var(--text-secondary);
}
.tf-btn:hover { border-color: var(--accent); }
.tf-btn.correct { background: var(--green); border-color: var(--green); color: #fff; }
.tf-btn.incorrect { background: var(--red); border-color: var(--red); color: #fff; }

/* ============== TECH TERM ============== */
.tech-term {
  border-bottom: 1px dashed var(--accent); cursor: help;
  color: inherit; font-weight: 600;
  background: rgba(37,99,235,0.06);
  padding: 0 4px; border-radius: 4px;
}
.tooltip-backdrop {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(15,23,42,0.5); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
}
.tooltip-backdrop.show { display: flex; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.tooltip-card {
  max-width: 480px; width: calc(100% - 40px);
  background: var(--bg-card); border: 1px solid var(--accent);
  border-radius: 18px; padding: 28px 32px; box-shadow: var(--shadow-lg);
  animation: tipIn .3s cubic-bezier(.2,.7,.2,1.2);
}
@keyframes tipIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
.tooltip-card__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 14px; }
.tooltip-card__term { font-family: var(--font-display); font-size: 22px; }
.tooltip-card__close {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; font-size: 18px; color: var(--text-muted);
}
.tooltip-card__definition { font-size: 15px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.6; }
.tooltip-card__example { padding: 12px 14px; background: var(--accent-light); border-radius: 10px; font-size: 13px; color: #1e3a8a; }
.tooltip-card__example b { display: block; margin-bottom: 4px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }

/* ============== MODAL ============== */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 9990;
  background: rgba(15,23,42,0.6); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center; padding: 32px;
}
.modal-backdrop.show { display: flex; animation: fadeIn .2s ease; }
.modal {
  max-width: 720px; width: 100%; max-height: 85vh;
  background: var(--bg-card); border-radius: 24px;
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: var(--shadow-lg); animation: tipIn .3s ease;
}
.modal__head { padding: 22px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.modal__title { font-family: var(--font-display); font-size: 24px; }
.modal__close {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; font-size: 18px; color: var(--text-muted);
}
.modal__search { padding: 14px 28px; border-bottom: 1px solid var(--border); }
.modal__search-input {
  width: 100%; padding: 11px 14px; font-size: 14px;
  border: 1px solid var(--border); border-radius: 10px;
  font-family: var(--font-body);
}
.modal__search-input:focus { outline: none; border-color: var(--accent); box-shadow: var(--shadow-glow); }
.modal__body { padding: 12px 28px 24px; overflow-y: auto; flex: 1; }

.glossary-item { padding: 12px 0; border-bottom: 1px solid var(--border-light); }
.glossary-item:last-child { border-bottom: none; }
.glossary-item__term { font-family: var(--font-display); font-size: 17px; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
.glossary-item__abbr { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: var(--accent-light); color: var(--accent); font-weight: 700; }
.glossary-item__def { font-size: 13px; color: var(--text-secondary); }

/* All slides modal */
.allslides-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
}
.allslides-tile {
  padding: 12px; background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 10px; cursor: pointer; transition: all .2s ease; text-align: left;
  font-family: var(--font-body);
}
.allslides-tile:hover { border-color: var(--accent); transform: translateY(-2px); }
.allslides-tile.active { border-color: var(--accent); background: var(--accent-light); }
.allslides-tile__num { font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.1em; }
.allslides-tile__title { font-size: 12px; color: var(--text-primary); font-weight: 600; line-height: 1.3; margin-top: 4px; }

/* ============== CASES ============== */
.case-detail {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 18px; padding: 24px 28px;
  display: flex; flex-direction: column;
}
.case-detail__head { margin-bottom: 18px; }
.case-detail__co { font-family: var(--font-display); font-size: 36px; line-height: 1.1; }
.case-detail__tag {
  display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}
.case-rows { display: grid; gap: 12px; margin-bottom: 18px; }
.case-row {
  display: grid; grid-template-columns: 140px 1fr; gap: 16px;
  padding: 12px 0; border-bottom: 1px solid var(--border-light);
  font-size: 14px;
}
.case-row__label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
.case-row__value { color: var(--text-secondary); line-height: 1.5; }
.case-detail__lesson {
  margin-top: auto; padding: 16px 18px;
  background: linear-gradient(135deg, var(--accent-light), #ecfdf5);
  border-radius: 12px; border-left: 4px solid var(--accent);
  font-size: 14px; color: #1e3a8a; line-height: 1.55;
}
.case-detail__lesson b { display: block; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }

.case-sources {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border-light);
}
.case-sources__label {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 8px;
}
.case-sources__pills {
  display: flex; flex-wrap: wrap; gap: 7px;
}
.case-sources__pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-primary); text-decoration: none;
  font-size: 12px; font-weight: 500; line-height: 1.2;
  transition: all 0.18s ease;
}
.case-sources__pill:hover {
  border-color: var(--accent); background: var(--accent-light);
  color: var(--accent); transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.case-sources__pill-icon { font-size: 12px; opacity: 0.85; }

/* ============== CASE LOGO CROWN + DEEP DIVE ============== */
.case-crown {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 16px;
  flex-shrink: 0;
}
.case-crown__logo {
  width: 44px; height: 44px; border-radius: 10px;
  background: #fff; border: 1px solid var(--border);
  display: grid; place-items: center; flex-shrink: 0;
  overflow: hidden; padding: 6px;
}
.case-crown__logo img {
  width: 100%; height: 100%; object-fit: contain; display: block;
}
.case-crown__logo-fallback {
  font-family: var(--font-display); font-size: 18px;
  color: var(--text-primary); line-height: 1;
}
.case-crown__name {
  font-family: var(--font-display); font-size: 22px;
  line-height: 1.1;
}
.case-crown__tag {
  font-size: 12px; color: var(--text-muted);
  margin-top: 2px;
}
.case-crown__breadcrumb {
  margin-left: auto; display: flex; gap: 6px; align-items: center;
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted);
}
.case-crown__breadcrumb-chip {
  padding: 4px 10px; border-radius: 999px;
  background: var(--accent-light); color: var(--accent);
  font-weight: 700;
}
.case-crown__nav {
  display: flex; gap: 4px; margin-left: 6px;
}
.case-crown__nav-btn {
  width: 26px; height: 26px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg-card);
  cursor: pointer; font-size: 12px; color: var(--text-muted);
  display: grid; place-items: center;
  transition: all 0.18s ease;
}
.case-crown__nav-btn:hover {
  border-color: var(--accent); color: var(--accent);
}

/* Existing case-detail overview now puts logo inside head */
.case-detail__head {
  display: flex; align-items: center; gap: 16px; margin-bottom: 18px;
}
.case-detail__logo {
  width: 64px; height: 64px; border-radius: 14px;
  background: #fff; border: 1px solid var(--border);
  display: grid; place-items: center; padding: 8px;
  overflow: hidden; flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}
.case-detail__logo img { width: 100%; height: 100%; object-fit: contain; }
.case-detail__head-text { flex: 1; min-width: 0; }

/* Deep-dive shared body */
.case-deep {
  display: flex; flex-direction: column; gap: 14px;
}
.case-deep__h {
  font-family: var(--font-display); font-size: 19px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.case-deep__h-icon { font-size: 18px; }
.case-deep__panel {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 18px;
}

/* Methodology grid */
.method-grid {
  display: grid; gap: 0;
  grid-template-columns: 150px 1fr;
}
.method-grid__row {
  display: contents;
}
.method-grid__label, .method-grid__value {
  padding: 11px 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px; line-height: 1.5;
}
.method-grid__label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted);
  padding-top: 13px;
}
.method-grid__value { color: var(--text-secondary); padding-left: 12px; }
.method-grid__row:last-child .method-grid__label,
.method-grid__row:last-child .method-grid__value { border-bottom: none; }
.method-decisions { margin: 4px 0 0 18px; padding: 0; }
.method-decisions li {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 4px; line-height: 1.5;
}

/* Numbers hero */
.numbers-hero {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}
.numbers-hero__card {
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark-2));
  color: #fff; border-radius: 14px; padding: 18px 20px;
}
.numbers-hero__label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.55);
  margin-bottom: 6px;
}
.numbers-hero__value {
  font-family: var(--font-display); font-size: 34px;
  color: #6ee7b7; line-height: 1; margin-bottom: 4px;
}
.numbers-hero__unit {
  font-size: 11.5px; color: rgba(255,255,255,0.7);
  font-family: var(--font-mono);
}

.scope-table { width: 100%; border-collapse: collapse; }
.scope-table th, .scope-table td {
  text-align: left; padding: 9px 12px; font-size: 13px;
  border-bottom: 1px solid var(--border-light);
}
.scope-table th {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted);
  background: var(--bg-secondary);
}
.scope-table tr:last-child td { border-bottom: none; }
.scope-table td:first-child { font-weight: 600; color: var(--text-primary); width: 160px; }
.scope-table td:last-child { color: var(--text-secondary); }

.notes-callout {
  padding: 11px 14px; border-radius: 10px;
  background: var(--accent-light); border-left: 3px solid var(--accent);
  font-size: 12.5px; color: #1e3a8a; line-height: 1.5;
}

/* Strategy slide */
.target-banner {
  background: linear-gradient(135deg, #00b39f, #16a34a);
  color: #fff; border-radius: 14px;
  padding: 18px 22px;
  display: flex; flex-direction: column; gap: 6px;
}
.target-banner__label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: rgba(255,255,255,0.8);
}
.target-banner__title {
  font-family: var(--font-display); font-size: 22px; line-height: 1.1;
}
.target-banner__body {
  font-size: 13px; color: rgba(255,255,255,0.92); line-height: 1.55;
}
.lever-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.lever-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px 16px;
}
.lever-card__num {
  font-family: var(--font-display); font-size: 14px;
  color: var(--accent); margin-bottom: 4px;
}
.lever-card__title {
  font-family: var(--font-display); font-size: 15px;
  margin-bottom: 4px;
}
.lever-card__body { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; }

.context-row {
  display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}
.context-pill {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 13px;
  font-size: 12.5px; line-height: 1.5;
}
.context-pill__label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 3px;
}
.context-pill__body { color: var(--text-primary); }

.quote-card {
  background: linear-gradient(135deg, var(--accent-light), #ecfdf5);
  border-left: 3px solid var(--accent);
  border-radius: 12px; padding: 14px 18px;
}
.quote-card__text {
  font-family: var(--font-display); font-size: 16px;
  color: #1e3a8a; line-height: 1.4; margin-bottom: 6px;
  font-style: italic;
}
.quote-card__author {
  font-size: 12px; color: var(--text-secondary);
  font-weight: 500;
}

/* ============== CAPSTONE ============== */
.capstone-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 22px; flex: 1; min-height: 0; overflow: hidden; }
.capstone-inputs { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 4px; }
.capstone-input {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
}
.capstone-input__head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 10px; }
.capstone-input__name { font-weight: 600; font-size: 13.5px; }
.capstone-input__cat { font-size: 10px; padding: 2px 8px; border-radius: 999px; background: var(--accent-light); color: var(--accent); font-weight: 700; flex-shrink: 0; }
.capstone-input__data { font-size: 11.5px; color: var(--text-muted); margin-bottom: 8px; font-family: var(--font-mono); }
.capstone-input__row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.capstone-select {
  padding: 6px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: #fff;
  font-family: var(--font-body); font-size: 12px; cursor: pointer;
}

.capstone-output {
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark-2));
  color: #fff; border-radius: 14px; padding: 20px; align-self: start;
  display: flex; flex-direction: column; gap: 12px;
}
.capstone-output__label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
.capstone-output__total { font-family: var(--font-display); font-size: 36px; color: #6ee7b7; line-height: 1; }
.capstone-output__unit { font-size: 12px; color: rgba(255,255,255,0.6); }
.capstone-meter-track { height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
.capstone-meter-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #6ee7b7); width: 0%; transition: width .4s ease; border-radius: 999px; }
.capstone-meter-label { font-size: 12px; color: rgba(255,255,255,0.7); }

.use-case-wrap {
  display: grid; grid-template-columns: 1.5fr 1fr;
  gap: 22px; align-items: start;
}
.use-case-chat {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px 16px;
  display: flex; flex-direction: column;
  position: relative;
}
.use-case-side {
  display: flex; flex-direction: column; gap: 14px;
  position: sticky; top: 70px;
  align-self: start;
}
.story-chat {
  background: transparent;
  border: none;
  padding: 0;
  display: flex; flex-direction: column;
  position: relative;
}

.data-snapshot {
  background: linear-gradient(135deg, var(--bg-dark), var(--bg-dark-2));
  color: #fff; border-radius: 14px;
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 4px;
}
.data-snapshot__title {
  font-family: var(--font-display); font-size: 16px;
  color: #fff; margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.data-snapshot__row {
  display: grid; grid-template-columns: 92px 1fr;
  gap: 12px; font-size: 12px;
  align-items: start; padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.data-snapshot__row:last-child { border-bottom: none; }
.data-snapshot__label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.55);
  padding-top: 2px;
}
.data-snapshot__value {
  color: rgba(255,255,255,0.95); line-height: 1.5;
  font-family: var(--font-mono); font-size: 11.5px;
}
.data-snapshot__value--big {
  font-family: var(--font-display); font-size: 26px;
  color: #6ee7b7; line-height: 1;
}
.data-snapshot__dq {
  display: inline-flex; gap: 4px; align-items: center;
}
.data-snapshot__dq-dot {
  width: 11px; height: 11px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
}
.data-snapshot__dq-dot--filled {
  background: linear-gradient(135deg, var(--accent), #6ee7b7);
}
.data-snapshot__dq-text {
  margin-left: 6px; font-size: 11px;
  color: rgba(255,255,255,0.8); font-family: var(--font-body);
}

.wwyd {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.wwyd__title {
  font-family: var(--font-display); font-size: 16px;
  display: flex; align-items: center; gap: 8px;
}
.wwyd__prompt {
  font-size: 12.5px; color: var(--text-secondary);
  margin-bottom: 4px; line-height: 1.5;
}
.wwyd__options {
  display: flex; flex-direction: column; gap: 8px;
}
.wwyd__option {
  text-align: left; padding: 10px 12px;
  border: 1.5px solid var(--border); background: var(--bg-card);
  border-radius: 10px; cursor: pointer;
  font-family: var(--font-body); font-size: 12.5px;
  color: var(--text-primary); transition: all 0.2s ease;
  line-height: 1.45;
  display: flex; align-items: flex-start; gap: 10px;
  width: 100%;
}
.wwyd__option:hover {
  border-color: var(--accent); background: var(--accent-light);
}
.wwyd__option-letter {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--bg-secondary); color: var(--text-secondary);
  font-weight: 700; font-size: 11px; flex-shrink: 0;
  display: grid; place-items: center;
}
.wwyd__option.picked {
  border-color: var(--accent); background: var(--accent-light);
}
.wwyd__option.picked .wwyd__option-letter {
  background: var(--accent); color: #fff;
}
.wwyd__outcome {
  display: none;
  padding: 11px 13px; margin-top: 4px;
  background: var(--green-light); border-left: 3px solid var(--green);
  border-radius: 8px; font-size: 12px; color: #064e3b;
  line-height: 1.5;
}
.wwyd__outcome.show { display: block; animation: fadeUp 0.3s ease; }

const GLOSSARY = [
  { term: 'GHG', long: 'Greenhouse Gas', def: 'Atmospheric gases that trap heat. The Kyoto basket: CO₂, CH₄, N₂O, HFCs, PFCs, SF₆, NF₃.', ex: 'A coal-fired power plant primarily emits CO₂; a beef farm emits significant CH₄.' },
  { term: 'GHG Protocol', def: 'The most widely used GHG accounting standard, published by WRI and WBCSD. Defines the Corporate Standard (Scope 1/2), Scope 2 Guidance, and Scope 3 Standard.', ex: 'When a company reports "Scope 3 Cat 1 = 12 ktCO₂e," they are using the GHG Protocol classification.' },
  { term: 'CO₂e', long: 'Carbon Dioxide Equivalent', def: 'Common unit that converts every GHG into the warming impact of CO₂ using its GWP. Lets you sum methane + CO₂ + N₂O into one number.', ex: '1 tonne of methane ≈ 28 tCO₂e on a 100-year GWP basis (IPCC AR6).' },
  { term: 'GWP', long: 'Global Warming Potential', def: 'How much heat a GHG traps relative to CO₂ over a time horizon (commonly 100 years, GWP100).', ex: 'CH₄ has GWP100 ≈ 28; SF₆ ≈ 23,500.' },
  { term: 'EEIO', long: 'Environmentally-Extended Input-Output', def: 'A modelling approach that assigns emission intensity (kgCO₂e per $) to each industry sector. Used for spend-based estimates when supplier data is unavailable.', ex: 'EXIOBASE and the US EPA EEIO are both EEIO databases.' },
  { term: 'PCAF', long: 'Partnership for Carbon Accounting Financials', def: 'Industry-led standard for measuring financed emissions. Mandates a 1–5 data-quality score and asset-class-specific methods. Compatible with Scope 3 Cat 15.', ex: 'A bank scoring its corporate loan book under PCAF assigns DQ-1 (verified actuals) to its largest exposures and DQ-5 (sector-average) to long-tail SMEs.' },
  { term: 'SBTi', long: 'Science Based Targets initiative', def: 'Validates corporate climate targets against 1.5 °C pathways. Requires Scope 3 inclusion if it exceeds 40 % of total inventory.', ex: 'A retailer with Scope 3 ≈ 90 % of footprint must include Scope 3 in its near-term and net-zero targets.' },
  { term: 'ISSB', long: 'International Sustainability Standards Board', def: 'IFRS-affiliated body. IFRS S2 mandates Scope 1, 2 and material Scope 3 disclosure for adopting jurisdictions.', ex: 'UK, Australia, Canada, Japan, Brazil are aligning national disclosure regimes to IFRS S2.' },
  { term: 'ESRS E1', long: 'European Sustainability Reporting Standards — Climate', def: 'EU CSRD climate standard. Requires GHG inventory across all three scopes plus transition plan and physical/transition risk.', ex: 'A French manufacturer in scope of CSRD must disclose Scope 3 categories that are material — typically Cat 1, 4, 11.' },
  { term: 'CDP', def: 'A non-profit running a global environmental disclosure platform. Used by 700+ investors to score corporates on climate, water and forests.', ex: 'A company answering CDP Climate Change must disclose its Scope 3 categories with method and data-quality flags.' },
  { term: 'WTT', long: 'Well-To-Tank', def: 'Upstream emissions of producing and transporting a fuel before it is combusted. Captured in Scope 3 Cat 3.', ex: 'For a litre of diesel, WTT covers extraction, refining and distribution; combustion (TTW) is Scope 1.' },
  { term: 'T&D', long: 'Transmission &amp; Distribution', def: 'Electricity lost in the grid between the power plant and the end user. The losses themselves carry emissions reported under Scope 3 Cat 3.', ex: 'India\'s grid T&D loss is roughly 17 %; the embedded emissions of those losses sit in your Scope 3.' },
  { term: 'RECs', long: 'Renewable Energy Certificates', def: 'Tradable instruments certifying 1 MWh of renewable electricity generation. Used in market-based Scope 2 reporting.', ex: 'Buying I-RECs in India lets a company claim renewable electricity even if grid power is fossil-heavy.' },
  { term: 'PPA', long: 'Power Purchase Agreement', def: 'Long-term contract directly with a renewable generator for power and/or its certificates.', ex: 'Microsoft\'s 1.5 GW PPA portfolio drives most of its market-based Scope 2 reduction.' },
  { term: 'LCA', long: 'Life Cycle Assessment', def: 'A cradle-to-grave or cradle-to-gate environmental analysis of a product. Source of emission factors used in Scope 3 Cat 1 and Cat 11.', ex: 'A laptop\'s LCA might break out 75 % manufacturing, 22 % use, 3 % end-of-life.' },
  { term: 'BOM', long: 'Bill of Materials', def: 'Component list of a product with quantities. Foundation for activity-based Cat 1 calculations.', ex: 'For a smartphone, the BOM lets you multiply each material mass by its emission factor.' },
  { term: 'MACC', long: 'Marginal Abatement Cost Curve', def: 'A chart ranking emissions-reduction options by cost per tCO₂e abated.', ex: 'An MACC might show LED retrofit at -$30/tCO₂e (saves money) and CCS at +$120/tCO₂e.' },
  { term: 'Equity Share', def: 'Boundary approach where a company accounts for emissions in proportion to its ownership stake.', ex: 'You own 30 % of JV B → you account for 30 % of B\'s Scope 1 and 2 emissions.' },
  { term: 'Financial Control', def: 'Boundary approach where a company accounts for 100 % of operations it has the ability to direct financial &amp; operating policies of.', ex: 'A 51 %-owned subsidiary is fully consolidated under financial control.' },
  { term: 'Operational Control', def: 'Boundary approach where a company accounts for 100 % of operations it has full authority to introduce and implement operating policies for.', ex: 'Shell operating an oil field reports 100 % of those Scope 1 emissions even with low equity.' },
  { term: 'CBAM', long: 'Carbon Border Adjustment Mechanism', def: 'EU mechanism that prices the embedded carbon of imports in covered sectors (steel, cement, fertilisers, aluminium, hydrogen, electricity).', ex: 'An Indian steel exporter to the EU must report and from 2026 pay for embedded emissions per tonne.' },

/* =========================================================================
   RENDER HELPERS
   ========================================================================= */
function hexToRgba(hex, alpha) {
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2), 16);
  const g = parseInt(h.substring(2,4), 16);
  const b = parseInt(h.substring(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttrFull(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildChatHtml(messages, opts = {}) {
  const { autoplay = true, extraClass = '' } = opts;
  return `
    <div class="chat-flow ${extraClass}" data-autoplay="${autoplay ? 'true' : 'false'}">
      <button class="replay-btn" onclick="replayChatFlow(this.parentElement); event.stopPropagation();" type="button">
        <span style="font-size:10px">▶</span> Replay
      </button>
      ${messages.map((m, idx) => {
        const side = m.side || (idx % 2 === 0 ? 'left' : 'right');
        const bubbleStyle = `border:1px solid ${hexToRgba(m.color, 0.4)};background:${hexToRgba(m.color, 0.06)};`;
        const avatarStyle = `border-color:${m.color};color:${m.color};`;
        return `
          <div class="chat-msg" data-speaker="${escapeAttrFull(m.speaker)}" data-emoji="${escapeAttrFull(m.emoji)}" data-color="${m.color}" data-side="${side}" data-text="${escapeAttrFull(m.text)}">
            <div class="chat-msg__col">
              <div class="chat-msg__avatar" style="${avatarStyle}">${m.emoji}</div>
              <div class="chat-msg__speaker">${escapeHtml(m.speaker)}</div>
            </div>
            <div class="chat-msg__bubble" style="${bubbleStyle}"></div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function renderStory(L) {
  const messages = L.story.map(m => {
    const c = CHARACTERS[m.who];
    return {
      speaker: c.name, emoji: c.emoji, color: c.color,
      text: m.text, side: m.side || c.side,
    };
  });
  return buildChatHtml(messages, { extraClass: 'story-chat' });
}

function renderDataSnapshot(s) {
  const dqRounded = Math.round(s.dq);
  const dots = [1,2,3,4,5].map(n => `<span class="data-snapshot__dq-dot ${n <= dqRounded ? 'data-snapshot__dq-dot--filled' : ''}"></span>`).join('');
  return `
    <div class="data-snapshot">
      <div class="data-snapshot__title">📐 Data Snapshot</div>
      <div class="data-snapshot__row">
        <div class="data-snapshot__label">EF used</div>
        <div class="data-snapshot__value">${escapeHtml(s.ef)}</div>
      </div>
      <div class="data-snapshot__row">
        <div class="data-snapshot__label">Total</div>
        <div>
          <div class="data-snapshot__value--big">${escapeHtml(s.total)}</div>
          <div class="data-snapshot__value" style="margin-top:2px;color:rgba(255,255,255,0.6)">${escapeHtml(s.totalUnit)}</div>
        </div>
      </div>
      <div class="data-snapshot__row">
        <div class="data-snapshot__label">DQ score</div>
        <div>
          <div class="data-snapshot__dq">${dots}<span class="data-snapshot__dq-text">${s.dq.toFixed ? s.dq.toFixed(1) : s.dq} · ${escapeHtml(s.dqLabel)}</span></div>
        </div>
      </div>
      <div class="data-snapshot__row">
        <div class="data-snapshot__label">Assumption</div>
        <div class="data-snapshot__value" style="font-family:var(--font-body);font-size:12px">${escapeHtml(s.assumption)}</div>
      </div>
    </div>
  `;
}

function renderMCQ(L) {

  return `
